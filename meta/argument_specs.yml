---
# role: ca
# file: meta/argument_specs.yml

argument_specs:
  main:
    short_description: Manage a two-tier private certificate authority.
    description:
      - Creates and manages a Root CA plus Component, Network, and Identity issuing CAs.
      - Issues declared end-entity certificates, CRLs, embeds AIA/CDP URLs, and optionally
        manages CRL renewal automation.
      - Built-in CA topology, certificate profiles, and FritzBox bundle order are role vars;
        validity periods are the intended override points.
    options:
      ca_name:
        type: str
        required: false
        default: Yourdomain
        description:
          - CA name used in CA certificate common names and, lowercased, in the default
            CA working directory.
      ca_base_dir:
        type: str
        required: false
        description:
          - CA working directory.
          - Defaults to `/etc/pki/<ca_name | lower>` on RedHat-family systems and `/etc/ssl/<ca_name
            | lower>` on Debian and Suse-family systems.
      ca_base_url:
        type: str
        required: false
        default: https://pki.yourdomain.tld
        description: Base URL used when deriving default AIA and CDP URLs.
      ca_kerberos_realm:
        type: str
        required: false
        default: ''
        description: Optional default Kerberos realm for MSKDC PKINIT SAN encoding.
      ca_owner:
        type: str
        required: false
        default: root
        description: Owner for managed CA files.
      ca_group:
        type: str
        required: false
        default: root
        description: Group for managed CA files.
      ca_no_log:
        type: bool
        required: false
        default: true
        description: Suppress task output that can contain private key passphrases or PFX
          passphrases.
      ca_subject:
        type: dict
        required: false
        default:
          country: DE
          state: Bayern
          locality: Erlangen
          organization: Yourdomain SE
          organizational_unit: Yourdomain Certificate Authority
        description: Default X.509 subject attributes added before the certificate common
          name.
        options:
          country:
            type: str
            required: false
            description: X.509 subject country.
          state:
            type: str
            required: false
            description: X.509 subject state or province.
          locality:
            type: str
            required: false
            description: X.509 subject locality.
          organization:
            type: str
            required: false
            description: X.509 subject organization.
          organizational_unit:
            type: str
            required: false
            description: X.509 subject organizational unit.
      ca_default_bits:
        type: int
        required: false
        default: 4096
        description: DH parameter size when `ca_create_dhparams=true`.
      ca_default_md:
        type: str
        required: false
        default: sha512
        description: Default message digest for CRLs.
      ca_force_reissue:
        type: bool
        required: false
        default: false
        description: Force regeneration of keys, certificates, CRLs, and exports where supported.
      ca_certificate_async_timeout:
        type: int
        required: false
        default: 600
        description: Async timeout in seconds for end-entity certificate and bundle jobs.
      ca_certificate_async_retries:
        type: int
        required: false
        default: 600
        description: Number of async status retries for end-entity certificate and bundle
          jobs.
      ca_certificate_async_delay:
        type: int
        required: false
        default: 1
        description: Delay in seconds between async status checks for end-entity certificate
          and bundle jobs.
      ca_authorities:
        type: list
        elements: dict
        required: false
        description: Managed CA topology. Store real `key_passphrase` values in Ansible
          Vault.
        options:
          name:
            type: str
            required: true
            description: Authority identifier and CA file stem.
          common_name:
            type: str
            required: true
            description: Authority certificate common name.
          subject:
            type: dict
            required: false
            description: Optional authority subject attribute overrides merged with `ca_subject`.
          parent:
            type: str
            required: true
            description: Parent authority name. Set this to the same value as `name` for
              a self-signed authority.
          days:
            type: int
            required: true
            description: Authority certificate validity in days.
          default_days:
            type: int
            required: true
            description: Default validity in days for end-entity certificates issued by
              this authority.
          crl_days:
            type: int
            required: true
            description: CRL validity in days.
          key_passphrase:
            type: str
            required: true
            description: Authority private key passphrase.
          revocations:
            type: list
            elements: dict
            required: false
            default: []
            description: Revoked certificate entries for this authority.
          crl_digest:
            type: str
            required: false
            description: Optional CRL message digest override.
      ca_certificates:
        type: list
        elements: dict
        required: false
        default: []
        description: End-entity certificates to manage.
        options:
          name:
            type: str
            required: true
            description: Certificate identifier and default file stem.
          type:
            type: str
            required: true
            choices:
              - tls_server
              - tls_client
              - mskdc
              - fritzbox
              - identity_full
              - identity
              - eap_tls_client
            description: Built-in certificate profile to use.
          common_name:
            type: str
            required: true
            description: Certificate common name.
          subject:
            type: dict
            required: false
            description: Optional certificate subject attribute overrides merged with `ca_subject`.
          email:
            type: str
            required: false
            description: Optional subject email address.
          san:
            type: list
            elements: str
            required: false
            default: []
            description: Subject Alternative Name entries in OpenSSL syntax.
          krb5_realm:
            type: str
            required: false
            description: Required for `mskdc` unless `ca_kerberos_realm` is set; Kerberos
              realm encoded as `krbtgt/<REALM>@<REALM>` in the PKINIT SAN.
          ad_object_guid:
            type: str
            required: false
            description: Required for `mskdc`; AD objectGUID of the domain controller, as
              canonical GUID or raw 16-byte hex.
          days:
            type: int
            required: false
            description: Per-certificate validity override.
          output_dir:
            type: str
            required: false
            description: Optional certificate-specific output directory.
          key_passphrase:
            type: str
            required: false
            description: Optional private key passphrase for the end-entity key.
          pfx_passphrase:
            type: str
            required: false
            description: PFX/PKCS#12 export passphrase.
          friendly_name:
            type: str
            required: false
            description: Friendly name for PFX/PKCS#12 export.
      ca_crl_automation:
        type: dict
        required: false
        description: Optional systemd CRL renewal automation.
        options:
          enabled:
            type: bool
            required: false
            default: false
            description: Manage and enable the CRL renewal timer.
          ansible_playbook:
            type: str
            required: false
            default: ansible-playbook
            description: Command used by the CRL renewal service.
          on_calendar:
            type: str
            required: false
            default: daily
            description: systemd timer OnCalendar value.
          randomized_delay_sec:
            type: str
            required: false
            default: 15m
            description: systemd timer randomized delay.
          persistent:
            type: bool
            required: false
            default: true
            description: systemd timer Persistent value.
      ca_create_dhparams:
        type: bool
        required: false
        default: false
        description: Generate Diffie-Hellman parameters under the platform PKI base directory.
