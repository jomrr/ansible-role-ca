---
# role: ca
# file: meta/argument_specs.yml

argument_specs:
  main:
    short_description: Manage a two-tier private certificate authority.
    description:
      - Creates and manages a Root CA plus Component, Network, and Identity issuing CAs.
      - Issues declared certificates, CRLs, embeds AIA/CDP URLs, writes a non-secret CA
        inventory, and optionally manages CRL renewal automation.
      - Built-in CA topology and certificate profiles are role vars; certificate format
        defaults live in the modules; FritzBox bundle order is fixed in the module; validity
        periods are the intended override points.
    options:
      ca_name:
        type: str
        required: false
        default: Yourdomain
        description:
          - CA name used in CA certificate common names and, lowercased, in the default
            CA working directory.
      ca_base_dir:
        type: str
        required: false
        description:
          - CA working directory.
          - Defaults to `/etc/pki/<ca_name | lower>` on RedHat-family systems and `/etc/ssl/<ca_name
            | lower>` on Debian and Suse-family systems.
      ca_base_url:
        type: str
        required: false
        default: http://pki.yourdomain.tld
        description:
          - Base URL used when deriving default AIA and CDP URLs.
          - The default uses plain HTTP because AIA and CDP endpoints should be reachable
            without TLS bootstrapping.
      ca_kerberos_realm:
        type: str
        required: false
        default: ''
        description: Optional default Kerberos realm for MSKDC PKINIT SAN encoding.
      ca_owner:
        type: str
        required: false
        default: root
        description: Owner for managed CA files.
      ca_group:
        type: str
        required: false
        default: root
        description: Group for managed CA files.
      ca_no_log:
        type: bool
        required: false
        default: true
        description: Suppress task output that can contain private key passphrases or PFX
          passphrases.
      ca_subject:
        type: dict
        required: false
        default:
          country: DE
          state: Bayern
          locality: Erlangen
          organization: Yourdomain SE
          organizational_unit: Yourdomain Certificate Authority
        description: Default X.509 subject attributes added before the certificate common
          name.
        options:
          country:
            type: str
            required: false
            description: X.509 subject country.
          state:
            type: str
            required: false
            description: X.509 subject state or province.
          locality:
            type: str
            required: false
            description: X.509 subject locality.
          organization:
            type: str
            required: false
            description: X.509 subject organization.
          organizational_unit:
            type: str
            required: false
            description: X.509 subject organizational unit.
      ca_default_bits:
        type: int
        required: false
        default: 4096
        description: DH parameter size when `ca_create_dhparams=true`.
      ca_force_reissue:
        type: bool
        required: false
        default: false
        description: Force regeneration of keys, certificates, CRLs, and exports where supported.
      ca_certificate_async_timeout:
        type: int
        required: false
        default: 600
        description: Async timeout in seconds for certificate and bundle jobs.
      ca_certificate_async_retries:
        type: int
        required: false
        default: 600
        description: Number of async status retries for certificate and bundle jobs.
      ca_certificate_async_delay:
        type: int
        required: false
        default: 1
        description: Delay in seconds between async status checks for certificate and bundle
          jobs.
      ca_renewal:
        type: dict
        required: false
        default:
          warn_before_days: 30
          renew_before_days: 0
          renew_at: ''
          rekey: false
        description:
          - Default renewal policy for CA authorities and certificates.
          - '`warn_before_days` marks renewal warning state in CA inventory but does not
            renew by itself.'
          - '`renew_before_days` renews when the existing certificate reaches that remaining-validity
            window.'
          - '`renew_at` renews once at or after a scheduled ISO-8601 or `YYYYMMDDHHMMSSZ`
            timestamp, but only for certificates issued before that timestamp.'
          - '`rekey=true` generates a new private key when renewal is triggered; otherwise
            renewal keeps the existing key.'
          - Replaced generations are archived below `<ca_base_dir>/archive`; issuing CA
            chains also get serial-specific files below `<ca_base_dir>/chains`.
        options:
          warn_before_days:
            type: int
            required: false
            default: 30
            description: Remaining-validity warning window in days.
          renew_before_days:
            type: int
            required: false
            default: 0
            description: Remaining-validity renewal window in days. `0` disables automatic
              window renewal.
          renew_at:
            type: str
            required: false
            default: ''
            description: Optional scheduled renewal timestamp as ISO-8601 or `YYYYMMDDHHMMSSZ`.
          rekey:
            type: bool
            required: false
            default: false
            description: Generate a new private key when renewal is due.
      ca_authorities:
        type: list
        elements: dict
        required: false
        description: Managed CA topology. Store real `key_passphrase` values in Ansible
          Vault.
        options:
          name:
            type: str
            required: true
            description: Authority identifier and CA file stem.
          common_name:
            type: str
            required: true
            description: Authority certificate common name.
          subject:
            type: dict
            required: false
            description: Optional authority subject attribute overrides merged with `ca_subject`.
          key_type:
            type: str
            required: false
            description: Optional authority key type. Supported values include `RSA`, `ECDSA`,
              `P-256`, `P-384`, `Ed25519`, and `Ed448`; defaults to `RSA`.
          key_size:
            type: int
            required: false
            description: Optional authority key size. RSA defaults to `4096`; ECDSA accepts
              `256` or `384`; Ed25519 and Ed448 do not use a key size.
          parent:
            type: str
            required: true
            description: Parent authority name. Set this to the same value as `name` for
              a self-signed authority.
          days:
            type: int
            required: true
            description: Authority certificate validity in days.
          default_days:
            type: int
            required: true
            description: Default validity in days for certificates issued by this authority.
          crl_days:
            type: int
            required: true
            description: CRL validity in days.
          key_passphrase:
            type: str
            required: true
            description: Authority private key passphrase.
          renewal:
            type: dict
            required: false
            description: Authority renewal policy override merged with `ca_renewal`.
          crl_digest:
            type: str
            required: false
            description: Optional CRL message digest override.
          crl_publish_hook:
            type: dict
            required: false
            description:
              - Optional command hook executed after this authority's CRL files change.
              - The hook uses `ansible.builtin.command` with `argv`; no shell is invoked.
            options:
              argv:
                type: list
                elements: str
                required: true
                description: Command and arguments to execute.
              environment:
                type: dict
                required: false
                description: Optional environment variables for the hook process.
      ca_revocations:
        type: dict
        required: false
        default:
          root: []
          component: []
          network: []
          identity: []
        description:
          - Revoked certificate entries keyed by issuing authority name.
          - Missing authority keys mean that no certificate is revoked for that authority.
          - Each list item must identify one certificate by `name`, `certificate_name`,
            `fingerprint`, `sha1`, `sha256`, `serial_number`, or `serial`.
          - Names and fingerprints are resolved from the managed CA inventory; serial numbers
            can be decimal, `0x` hex, or colon-separated hex.
          - Optional item fields are `reason`, `revocation_date`, and `invalidity_date`.
          - Supported reasons are `key_compromise`, `ca_compromise`, `affiliation_changed`,
            `superseded`, `cessation_of_operation`, `certificate_hold`, `privilege_withdrawn`,
            and `aa_compromise`.
          - PEM and DER CRLs are regenerated from one shared CRL object, so both formats
            have identical CRL Number, AKI, timestamps, and revoked entries.
      ca_certificates:
        type: list
        elements: dict
        required: false
        default: []
        description: Certificates to manage.
        options:
          name:
            type: str
            required: true
            description: Certificate identifier and default file stem.
          type:
            type: str
            required: true
            choices:
              - tls_server
              - tls_client
              - mskdc
              - fritzbox
              - identity_full
              - identity
              - eap_tls_client
            description: Built-in certificate profile to use.
          formats:
            type: list
            elements: str
            required: false
            description:
              - Optional output format override passed to the certificate module.
              - Defaults are module-owned. Standard certificates and MSKDC default to `pem,der,txt`;
                Identity defaults to `pem,der,txt,pfx`; FritzBox defaults to `pem,der,txt,fritzbox`.
              - Add `fullchain` to create a certificate plus issuing-chain PEM bundle.
          common_name:
            type: str
            required: true
            description: Certificate common name.
          subject:
            type: dict
            required: false
            description: Optional certificate subject attribute overrides merged with `ca_subject`.
          email:
            type: str
            required: false
            description: Optional subject email address.
          san:
            type: list
            elements: str
            required: false
            default: []
            description: Subject Alternative Name entries in OpenSSL syntax.
          krb5_realm:
            type: str
            required: false
            description: Required for `mskdc` unless `ca_kerberos_realm` is set; Kerberos
              realm encoded as `krbtgt/<REALM>@<REALM>` in the PKINIT SAN.
          ad_object_guid:
            type: str
            required: false
            description: Required for `mskdc`; AD objectGUID of the domain controller, as
              canonical GUID or raw 16-byte hex.
          days:
            type: int
            required: false
            description: Per-certificate validity override.
          output_dir:
            type: str
            required: false
            description: Optional certificate-specific output directory.
          key_type:
            type: str
            required: false
            description: Optional certificate key type. Supported values include `RSA`,
              `ECDSA`, `P-256`, `P-384`, `Ed25519`, and `Ed448`; defaults to `RSA`.
          key_size:
            type: int
            required: false
            description: Optional certificate key size. RSA defaults to `4096`; ECDSA accepts
              `256` or `384`; Ed25519 and Ed448 do not use a key size.
          key_passphrase:
            type: str
            required: false
            description: Optional private key passphrase for the certificate key.
          pfx_passphrase:
            type: str
            required: false
            description: PFX/PKCS#12 export passphrase.
          friendly_name:
            type: str
            required: false
            description: Friendly name for PFX/PKCS#12 export.
          renewal:
            type: dict
            required: false
            description: Certificate renewal policy override merged with `ca_renewal`.
          fritzbox_deploy:
            type: dict
            required: false
            description:
              - Optional FRITZ!OS deployment settings for FritzBox certificates.
              - Deployment runs only when `enabled=true` and the effective formats include
                `fritzbox`.
              - The module compares the desired certificate with the current FRITZ!Box HTTPS
                certificate and uploads only when they differ, unless `ca_force_reissue=true`.
            options:
              enabled:
                type: bool
                required: false
                default: false
                description: Enable deployment to a FRITZ!Box.
              url:
                type: str
                required: false
                default: https://fritz.box
                description:
                  - FRITZ!Box deployment URL.
                  - HTTPS is required for the default idempotent certificate comparison;
                    `ca_force_reissue=true` skips that comparison and uploads directly.
              username:
                type: str
                required: false
                description: FRITZ!OS user name.
              password:
                type: str
                required: false
                description: FRITZ!OS password.
              timeout:
                type: int
                required: false
                default: 30
                description: HTTP request timeout in seconds.
              validate_certs:
                type: bool
                required: false
                default: false
                description: Validate HTTPS certificates for the FRITZ!Box connection.
      ca_crl_automation_enabled:
        type: bool
        required: false
        default: false
        description:
          - Manage and enable CRL renewal timer instances.
          - The role enables `<ca_name | lower>-crl-renew@<authority>.timer` for every authority.
          - The service sources `/root/.profile` and expects `CA_<CA_NAME>_<AUTHORITY>_KEY_PASSPHRASE`
            environment variables, uppercased with non-alphanumeric characters replaced
            by underscores.
      ca_crl_automation_ansible_playbook:
        type: str
        required: false
        default: ansible-playbook
        description: Command used by the CRL renewal service template.
      ca_crl_automation_on_calendar:
        type: str
        required: false
        default: daily
        description: systemd timer OnCalendar value.
      ca_crl_automation_randomized_delay_sec:
        type: str
        required: false
        default: 15m
        description: systemd timer randomized delay.
      ca_crl_automation_persistent:
        type: bool
        required: false
        default: true
        description: systemd timer Persistent value.
      ca_create_dhparams:
        type: bool
        required: false
        default: false
        description: Generate Diffie-Hellman parameters under the platform PKI base directory.
