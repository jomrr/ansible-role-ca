---
# role: ansible-role-ca
# file: vars/main.yml

ca_certificate_types:
  tls_server:
    issuer: component
  tls_client:
    issuer: component
  mskdc:
    issuer: component
    required_fields:
      - ad_object_guid
  fritzbox:
    issuer: component
  identity_full:
    issuer: identity
  identity:
    issuer: identity
  eap_tls_client:
    issuer: network
