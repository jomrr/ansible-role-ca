---
# role: ansible-role-ca
# file: tasks/authority.yml

- name: "CA | Manage authority {{ ca_authority_name }}"
  vars:
    __ca_authority: "{{ ca_authorities[ca_authority_name] }}"
    __ca_authority_parent: "{{ ca_authorities[ca_authority_name].parent | default('') }}"
    __ca_authority_key_path: "{{ ca_base_dir }}/private/{{ ca_authority_name }}-ca.key"
    __ca_authority_pass_path: "{{ ca_base_dir }}/private/{{ ca_authority_name }}-ca.pass"
    __ca_authority_csr_path: "{{ ca_base_dir }}/csr/{{ ca_authority_name }}-ca.csr"
    __ca_authority_cert_path: "{{ ca_base_dir }}/ca/{{ ca_authority_name }}-ca.pem"
    __ca_authority_der_path: "{{ ca_base_dir }}/ca/{{ ca_authority_name }}-ca.der"
    __ca_authority_ext_path: "{{ ca_base_dir }}/ext/{{ ca_authority_name }}-ca.ext"
    __ca_authority_chain_path: "{{ ca_base_dir }}/chains/{{ ca_authority_name }}-ca-chain.pem"
    __ca_authority_serial_path: "{{ ca_base_dir }}/ca/{{ ca_authority_name }}-ca.srl"
    __ca_authority_parent_key_path: "{{ ca_base_dir }}/private/{{ __ca_authority_parent }}-ca.key"
    __ca_authority_parent_pass_path: "{{ ca_base_dir }}/private/{{ __ca_authority_parent }}-ca.pass"
    __ca_authority_parent_cert_path: "{{ ca_base_dir }}/ca/{{ __ca_authority_parent }}-ca.pem"
    __ca_authority_parent_chain_path: "{{ ca_base_dir }}/chains/{{ __ca_authority_parent }}-ca-chain.pem"
    __ca_authority_subject: >-
      {{
        [
          {'C': ca_country},
          {'ST': ca_state},
          {'L': ca_locality},
          {'O': ca_organization},
          {'OU': ca_organizational_unit},
          {'CN': __ca_authority.common_name}
        ]
      }}
  block:
    - name: "CA | Manage root authority material for {{ ca_authority_name }}"
      ca_root_x509:
        key_path: "{{ __ca_authority_key_path }}"
        csr_path: "{{ __ca_authority_csr_path }}"
        cert_path: "{{ __ca_authority_cert_path }}"
        der_path: "{{ __ca_authority_der_path }}"
        key_type: "{{ __ca_authority.key_type | default(ca_key_type) }}"
        key_size: "{{ __ca_authority.bits | default(ca_default_bits) }}"
        key_passphrase: "{{ ca_privatekey_passphrases[ca_authority_name] }}"
        subject_ordered: "{{ __ca_authority_subject }}"
        basic_constraints: "{{ __ca_authority.basic_constraints }}"
        key_usage: "{{ __ca_authority.key_usage }}"
        key_usage_critical: true
        extended_key_usage: "{{ __ca_authority.extended_key_usage | default([]) }}"
        san: "{{ __ca_authority.san | default([]) }}"
        aia_url: "{{ (ca_aia.enabled | bool) | ternary(ca_aia.url ~ '/' ~ ca_authority_name ~ '-ca.der', '') }}"
        cdp_url: "{{ (ca_cdp.enabled | bool) | ternary(ca_cdp.url ~ '/' ~ ca_authority_name ~ '-ca.crl', '') }}"
        raw_extensions: "{{ __ca_authority.raw_extensions | default([]) }}"
        days: "{{ __ca_authority.days }}"
        digest: "{{ __ca_authority.digest | default(ca_default_md) }}"
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        key_mode: "0600"
        public_mode: "0644"
        force: "{{ ca_force_reissue | bool }}"
      when: __ca_authority_parent | length == 0
      no_log: "{{ ca_no_log | bool }}"

    - name: "CA | Manage issuing authority material for {{ ca_authority_name }}"
      ca_issuing_x509:
        key_path: "{{ __ca_authority_key_path }}"
        csr_path: "{{ __ca_authority_csr_path }}"
        cert_path: "{{ __ca_authority_cert_path }}"
        der_path: "{{ __ca_authority_der_path }}"
        key_type: "{{ __ca_authority.key_type | default(ca_key_type) }}"
        key_size: "{{ __ca_authority.bits | default(ca_default_bits) }}"
        key_passphrase: "{{ ca_privatekey_passphrases[ca_authority_name] }}"
        subject_ordered: "{{ __ca_authority_subject }}"
        basic_constraints: "{{ __ca_authority.basic_constraints }}"
        key_usage: "{{ __ca_authority.key_usage }}"
        key_usage_critical: true
        extended_key_usage: "{{ __ca_authority.extended_key_usage | default([]) }}"
        san: "{{ __ca_authority.san | default([]) }}"
        aia_url: "{{ (ca_aia.enabled | bool) | ternary(ca_aia.url ~ '/' ~ ca_authority_name ~ '-ca.der', '') }}"
        cdp_url: "{{ (ca_cdp.enabled | bool) | ternary(ca_cdp.url ~ '/' ~ ca_authority_name ~ '-ca.crl', '') }}"
        raw_extensions: "{{ __ca_authority.raw_extensions | default([]) }}"
        signer_cert_path: "{{ __ca_authority_parent_cert_path }}"
        signer_key_path: "{{ __ca_authority_parent_key_path }}"
        signer_key_passphrase: "{{ ca_privatekey_passphrases[__ca_authority_parent] }}"
        days: "{{ __ca_authority.days }}"
        digest: "{{ __ca_authority.digest | default(ca_default_md) }}"
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        key_mode: "0600"
        public_mode: "0644"
        force: "{{ ca_force_reissue | bool }}"
      when: __ca_authority_parent | length > 0
      no_log: "{{ ca_no_log | bool }}"

    - name: "CA | Create chain fragment directory for {{ ca_authority_name }}"
      ansible.builtin.file:
        path: "{{ ca_base_dir }}/tmp/chain-{{ ca_authority_name }}"
        state: directory
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        mode: "0700"

    - name: "CA | Add authority certificate to chain for {{ ca_authority_name }}"
      ansible.builtin.copy:
        src: "{{ __ca_authority_cert_path }}"
        dest: "{{ ca_base_dir }}/tmp/chain-{{ ca_authority_name }}/10-{{ ca_authority_name }}-ca.pem"
        remote_src: true
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        mode: "0644"

    - name: "CA | Add parent chain to authority chain for {{ ca_authority_name }}"
      ansible.builtin.copy:
        src: "{{ __ca_authority_parent_chain_path }}"
        dest: "{{ ca_base_dir }}/tmp/chain-{{ ca_authority_name }}/20-parent-chain.pem"
        remote_src: true
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        mode: "0644"
      when: __ca_authority_parent | length > 0

    - name: "CA | Remove parent chain fragment for root authority {{ ca_authority_name }}"
      ansible.builtin.file:
        path: "{{ ca_base_dir }}/tmp/chain-{{ ca_authority_name }}/20-parent-chain.pem"
        state: absent
      when: __ca_authority_parent | length == 0

    - name: "CA | Assemble authority chain for {{ ca_authority_name }}"
      ansible.builtin.assemble:
        src: "{{ ca_base_dir }}/tmp/chain-{{ ca_authority_name }}"
        dest: "{{ __ca_authority_chain_path }}"
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        mode: "0644"
