---
# role: ansible-role-ca
# file: tasks/authority.yml

- name: "CA | Manage authority {{ ca_authority_name }}"
  vars:
    __ca_authority: "{{ ca_authorities[ca_authority_name] }}"
    __ca_authority_parent: "{{ ca_authorities[ca_authority_name].parent | default('') }}"
    __ca_authority_subject: >-
      {{
        [
          {'C': ca_country},
          {'ST': ca_state},
          {'L': ca_locality},
          {'O': ca_organization},
          {'OU': ca_organizational_unit},
          {'CN': __ca_authority.common_name}
        ]
      }}
  block:
    - name: "CA | Manage root authority material for {{ ca_authority_name }}"
      ca_root:
        base_dir: "{{ ca_base_dir }}"
        name: "{{ ca_authority_name }}"
        ca_passphrases: "{{ ca_privatekey_passphrases }}"
        key_type: "{{ __ca_authority.key_type | default(ca_key_type) }}"
        key_size: "{{ __ca_authority.bits | default(ca_default_bits) }}"
        subject_ordered: "{{ __ca_authority_subject }}"
        basic_constraints: "{{ __ca_authority.basic_constraints }}"
        key_usage: "{{ __ca_authority.key_usage }}"
        extended_key_usage: "{{ __ca_authority.extended_key_usage | default([]) }}"
        san: "{{ __ca_authority.san | default([]) }}"
        aia_base_url: "{{ (ca_aia.enabled | bool) | ternary(ca_aia.url, '') }}"
        cdp_base_url: "{{ (ca_cdp.enabled | bool) | ternary(ca_cdp.url, '') }}"
        raw_extensions: "{{ __ca_authority.raw_extensions | default([]) }}"
        days: "{{ __ca_authority.days }}"
        digest: "{{ __ca_authority.digest | default(ca_default_md) }}"
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        force: "{{ ca_force_reissue | bool }}"
      when: __ca_authority_parent | length == 0
      no_log: "{{ ca_no_log | bool }}"

    - name: "CA | Manage issuing authority material for {{ ca_authority_name }}"
      ca_issuing:
        base_dir: "{{ ca_base_dir }}"
        name: "{{ ca_authority_name }}"
        parent: "{{ __ca_authority_parent }}"
        ca_passphrases: "{{ ca_privatekey_passphrases }}"
        key_type: "{{ __ca_authority.key_type | default(ca_key_type) }}"
        key_size: "{{ __ca_authority.bits | default(ca_default_bits) }}"
        subject_ordered: "{{ __ca_authority_subject }}"
        basic_constraints: "{{ __ca_authority.basic_constraints }}"
        key_usage: "{{ __ca_authority.key_usage }}"
        extended_key_usage: "{{ __ca_authority.extended_key_usage | default([]) }}"
        san: "{{ __ca_authority.san | default([]) }}"
        aia_base_url: "{{ (ca_aia.enabled | bool) | ternary(ca_aia.url, '') }}"
        cdp_base_url: "{{ (ca_cdp.enabled | bool) | ternary(ca_cdp.url, '') }}"
        raw_extensions: "{{ __ca_authority.raw_extensions | default([]) }}"
        days: "{{ __ca_authority.days }}"
        digest: "{{ __ca_authority.digest | default(ca_default_md) }}"
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        force: "{{ ca_force_reissue | bool }}"
      when: __ca_authority_parent | length > 0
      no_log: "{{ ca_no_log | bool }}"

    - name: "CA | Manage authority chain for {{ ca_authority_name }}"
      x509_chain:
        base_dir: "{{ ca_base_dir }}"
        name: "{{ ca_authority_name }}"
        parent: "{{ __ca_authority_parent }}"
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        force: "{{ ca_force_reissue | bool }}"
