---
# role: ca
# file: tasks/publish.yml

- name: "CA | Publish AIA and CDP artifacts"
  block:
    - name: "CA | Create remote publish staging directory"
      ansible.builtin.tempfile:
        state: directory
        prefix: "ca-publish-{{ ca_name | lower }}-"
      register: __ca_publish_remote_stage
      changed_when: false

    - name: "CA | Create remote publish archive"
      ca_publish_archive:
        base_dir: "{{ ca_base_dir }}"
        dest: "{{ __ca_publish_remote_stage.path }}/public.tar"
        authorities: "{{ ca_authorities }}"
        artifact_mode: "{{ ca_publish_mode }}"
        owner: "{{ ca_owner }}"
        group: "{{ ca_group }}"
        mode: "0600"
      register: __ca_publish_archive
      changed_when: false

    - name: "CA | Create local publish staging directory"
      ansible.builtin.tempfile:
        state: directory
        prefix: "ca-publish-{{ ca_name | lower }}-"
      register: __ca_publish_stage
      delegate_to: localhost
      changed_when: false

    - name: "CA | Stage publish archive on controller"
      ansible.builtin.fetch:
        src: "{{ __ca_publish_archive.path }}"
        dest: "{{ __ca_publish_stage.path }}/public.tar"
        flat: true
      changed_when: false

    - name: "CA | Register publish target hosts"
      ansible.builtin.add_host:
        name: "{{ ca_publish_target.name }}"
        ansible_host: "{{ ca_publish_target.ansible_host | default(omit) }}"
        ansible_user: "{{ ca_publish_target.ansible_user | default(omit) }}"
        ansible_port: "{{ ca_publish_target.ansible_port | default(omit) }}"
        ansible_ssh_private_key_file: "{{ ca_publish_target.ansible_ssh_private_key_file | default(omit) }}"
      loop: "{{ ca_publish_targets }}"
      loop_control:
        loop_var: ca_publish_target
        label: "{{ ca_publish_target.name }}"
      changed_when: false
      when: >-
        ca_publish_target.ansible_host is defined
        or ca_publish_target.ansible_user is defined
        or ca_publish_target.ansible_port is defined
        or ca_publish_target.ansible_ssh_private_key_file is defined

    - name: "CA | Create publish directories"
      ansible.builtin.file:
        path: >-
          {{
            ca_publish_pair.0.path | regex_replace('/+$', '')
          }}{{ ('/' ~ ca_publish_pair.1) if ca_publish_pair.1 else '' }}
        state: directory
        owner: "{{ ca_publish_pair.0.owner | default(ca_owner) }}"
        group: "{{ ca_publish_pair.0.group | default(ca_group) }}"
        mode: "{{ ca_publish_pair.0.directory_mode | default(ca_publish_directory_mode) }}"
      loop: "{{ ca_publish_targets | product(['', 'aia', 'crl']) | list }}"
      loop_control:
        loop_var: ca_publish_pair
        label: "{{ ca_publish_pair.0.name }}/{{ ca_publish_pair.1 | default('webroot', true) }}"
      delegate_to: "{{ ca_publish_pair.0.name }}"
      become: "{{ ca_publish_pair.0.become | default(false) | bool }}"
      become_user: "{{ ca_publish_pair.0.become_user | default('root') }}"

    - name: "CA | Check publish target manifests"
      ansible.builtin.stat:
        path: >-
          {{
            ca_publish_pair.0.path | regex_replace('/+$', '')
          }}/{{ ca_publish_pair.1 }}/.ca-publish-manifest.json
        checksum_algorithm: sha256
      loop: "{{ ca_publish_targets | product(__ca_publish_archive.manifest_sha256.keys() | list) | list }}"
      loop_control:
        loop_var: ca_publish_pair
        label: "{{ ca_publish_pair.0.name }}/{{ ca_publish_pair.1 }}"
      delegate_to: "{{ ca_publish_pair.0.name }}"
      become: "{{ ca_publish_pair.0.become | default(false) | bool }}"
      become_user: "{{ ca_publish_pair.0.become_user | default('root') }}"
      register: __ca_publish_target_manifests
      changed_when: false

    - name: "CA | Publish artifact archive"
      ansible.builtin.unarchive:
        src: "{{ __ca_publish_stage.path }}/public.tar"
        dest: "{{ ca_publish_target.path | regex_replace('/+$', '') }}"
        owner: "{{ ca_publish_target.owner | default(ca_owner) }}"
        group: "{{ ca_publish_target.group | default(ca_group) }}"
      loop: "{{ ca_publish_targets }}"
      loop_control:
        loop_var: ca_publish_target
        label: "{{ ca_publish_target.name }}"
      delegate_to: "{{ ca_publish_target.name }}"
      become: "{{ ca_publish_target.become | default(false) | bool }}"
      become_user: "{{ ca_publish_target.become_user | default('root') }}"
      when: >-
        __ca_publish_target_manifests.results
        | ca_publish_needs_unpack(
          ca_publish_target.name,
          __ca_publish_archive.manifest_sha256
        )
  always:
    - name: "CA | Remove local publish staging directory"
      ansible.builtin.file:
        path: "{{ __ca_publish_stage.path }}"
        state: absent
      when:
        - __ca_publish_stage is defined
        - __ca_publish_stage.path is defined
      delegate_to: localhost
      changed_when: false

    - name: "CA | Remove remote publish staging directory"
      ansible.builtin.file:
        path: "{{ __ca_publish_remote_stage.path }}"
        state: absent
      when:
        - __ca_publish_remote_stage is defined
        - __ca_publish_remote_stage.path is defined
      changed_when: false
