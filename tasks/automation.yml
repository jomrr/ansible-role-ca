---
# role: ansible-role-ca
# file: tasks/automation.yml

- name: "CA | Create CRL renewal automation directory"
  ansible.builtin.file:
    path: "{{ ca_base_dir }}/automation"
    state: directory
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    mode: "0750"
  when: ca_crl_automation_enabled | bool

- name: "CA | Render CRL renewal playbook"
  ansible.builtin.template:
    src: automation/crl-renew.yml.j2
    dest: "{{ ca_base_dir }}/automation/crl-renew.yml"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    mode: "0600"
  when: ca_crl_automation_enabled | bool

- name: "CA | Create CRL renewal module directories"
  ansible.builtin.file:
    path: "{{ ca_base_dir }}/automation/{{ item }}"
    state: directory
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    mode: "0750"
  loop:
    - library
    - module_utils
  when: ca_crl_automation_enabled | bool

- name: "CA | Install CRL renewal modules"
  ansible.builtin.copy:
    src: "{{ role_path }}/{{ item }}"
    dest: "{{ ca_base_dir }}/automation/{{ item }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    mode: "0644"
  loop:
    - library/ca_crl.py
    - module_utils/ca_file.py
    - module_utils/ca_inventory.py
    - module_utils/ca_profiles.py
    - module_utils/ca_renewal.py
    - module_utils/ca_serial.py
    - module_utils/ca_text.py
    - module_utils/ca_time.py
    - module_utils/ca_x509.py
  when: ca_crl_automation_enabled | bool

- name: "CA | Render CRL renewal systemd service"
  ansible.builtin.template:
    src: etc/systemd/system/ca-crl-renew.service.j2
    dest: "/etc/systemd/system/{{ ca_name | lower }}-crl-renew@.service"
    owner: root
    group: root
    mode: "0644"
  when: ca_crl_automation_enabled | bool

- name: "CA | Render CRL renewal systemd timer"
  ansible.builtin.template:
    src: etc/systemd/system/ca-crl-renew.timer.j2
    dest: "/etc/systemd/system/{{ ca_name | lower }}-crl-renew@.timer"
    owner: root
    group: root
    mode: "0644"
  when: ca_crl_automation_enabled | bool

- name: "CA | Disable legacy CRL renewal timer"
  ansible.builtin.systemd_service:
    name: "{{ ca_name | lower }}-ca-crl-renew.timer"
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false
  when: ca_crl_automation_enabled | bool

- name: "CA | Remove legacy CRL renewal systemd units"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/etc/systemd/system/{{ ca_name | lower }}-ca-crl-renew.service"
    - "/etc/systemd/system/{{ ca_name | lower }}-ca-crl-renew.timer"
  when: ca_crl_automation_enabled | bool

- name: "CA | Enable CRL renewal timer"
  ansible.builtin.systemd_service:
    name: "{{ ca_name | lower }}-crl-renew@{{ ca_authority.name }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ ca_authorities }}"
  loop_control:
    loop_var: ca_authority
    label: "{{ ca_authority.name }}"
  when: ca_crl_automation_enabled | bool

- name: "CA | Disable CRL renewal timer"
  ansible.builtin.systemd_service:
    name: "{{ ca_name | lower }}-crl-renew@{{ ca_authority.name }}.timer"
    enabled: false
    state: stopped
    daemon_reload: true
  loop: "{{ ca_authorities }}"
  loop_control:
    loop_var: ca_authority
    label: "{{ ca_authority.name }}"
  failed_when: false
  when: not ca_crl_automation_enabled | bool

- name: "CA | Remove CRL renewal systemd units"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/etc/systemd/system/{{ ca_name | lower }}-crl-renew@.service"
    - "/etc/systemd/system/{{ ca_name | lower }}-crl-renew@.timer"
    - "/etc/systemd/system/{{ ca_name | lower }}-ca-crl-renew.service"
    - "/etc/systemd/system/{{ ca_name | lower }}-ca-crl-renew.timer"
  when: not ca_crl_automation_enabled | bool

- name: "CA | Remove CRL renewal modules"
  ansible.builtin.file:
    path: "{{ ca_base_dir }}/automation/{{ item }}"
    state: absent
  loop:
    - library
    - module_utils
  when: not ca_crl_automation_enabled | bool
