---
# role: ansible-role-ca
# file: tasks/automation.yml

- name: "CA | Render CRL renewal playbook"
  ansible.builtin.template:
    src: automation/crl-renew.yml.j2
    dest: "{{ ca_base_dir }}/automation/crl-renew.yml"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    mode: "0600"
  when: ca_crl_automation.enabled | bool

- name: "CA | Create CRL renewal module directory"
  ansible.builtin.file:
    path: "{{ ca_base_dir }}/automation/library"
    state: directory
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    mode: "0750"
  when: ca_crl_automation.enabled | bool

- name: "CA | Install CRL renewal module"
  ansible.builtin.copy:
    src: "{{ role_path }}/library/ca_crl.py"
    dest: "{{ ca_base_dir }}/automation/library/ca_crl.py"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    mode: "0644"
  when: ca_crl_automation.enabled | bool

- name: "CA | Render CRL renewal systemd service"
  ansible.builtin.template:
    src: etc/systemd/system/ca-crl-renew.service.j2
    dest: "/etc/systemd/system/{{ ca_name | lower }}-ca-crl-renew.service"
    owner: root
    group: root
    mode: "0644"
  when: ca_crl_automation.enabled | bool

- name: "CA | Render CRL renewal systemd timer"
  ansible.builtin.template:
    src: etc/systemd/system/ca-crl-renew.timer.j2
    dest: "/etc/systemd/system/{{ ca_name | lower }}-ca-crl-renew.timer"
    owner: root
    group: root
    mode: "0644"
  when: ca_crl_automation.enabled | bool

- name: "CA | Enable CRL renewal timer"
  ansible.builtin.systemd_service:
    name: "{{ ca_name | lower }}-ca-crl-renew.timer"
    enabled: true
    state: started
    daemon_reload: true
  when: ca_crl_automation.enabled | bool

- name: "CA | Disable CRL renewal timer"
  ansible.builtin.systemd_service:
    name: "{{ ca_name | lower }}-ca-crl-renew.timer"
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false
  when: not ca_crl_automation.enabled | bool

- name: "CA | Remove CRL renewal systemd units"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/etc/systemd/system/{{ ca_name | lower }}-ca-crl-renew.service"
    - "/etc/systemd/system/{{ ca_name | lower }}-ca-crl-renew.timer"
  when: not ca_crl_automation.enabled | bool

- name: "CA | Remove CRL renewal module"
  ansible.builtin.file:
    path: "{{ ca_base_dir }}/automation/library"
    state: absent
  when: not ca_crl_automation.enabled | bool
