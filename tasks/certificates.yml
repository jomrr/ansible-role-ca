---
# role: ansible-role-ca
# file: tasks/certificates.yml

- name: "CA | Start certificate material jobs"
  x509_certificate:
    base_dir: "{{ ca_base_dir }}"
    base_url: "{{ ca_base_url }}"
    certificate: "{{ ca_certificate }}"
    certificate_types: "{{ ca_certificate_types }}"
    authorities: "{{ ca_authorities }}"
    kerberos_realm: "{{ ca_kerberos_realm }}"
    subject: "{{ ca_subject }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: "{{ ca_certificates }}"
  loop_control:
    loop_var: ca_certificate
    label: "{{ ca_certificate.name }}"
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_jobs
  no_log: true

- name: "CA | Wait for certificate material jobs"
  ansible.builtin.async_status:
    jid: "{{ ca_certificate_job.ansible_job_id }}"
  loop: >-
    {{
      __ca_certificate_jobs.results
      | default([])
      | selectattr('ansible_job_id', 'defined')
      | list
    }}
  loop_control:
    loop_var: ca_certificate_job
    label: "{{ ca_certificate_job.ca_certificate.name }}"
  register: __ca_certificate_material_status
  until: __ca_certificate_material_status.finished
  retries: "{{ ca_certificate_async_retries }}"
  delay: "{{ ca_certificate_async_delay }}"
  changed_when: __ca_certificate_material_status.changed | default(false)
  failed_when: __ca_certificate_material_status.failed | default(false)
  no_log: true

- name: "CA | Start PKCS#12 bundle jobs"
  ca_pkcs12:
    base_dir: "{{ ca_base_dir }}"
    certificate: "{{ ca_certificate_export.0.ca_certificate_job.ca_certificate }}"
    name: "{{ ca_certificate_export.0.ca_certificate_job.ca_certificate.name }}"
    format: "{{ ca_certificate_export.1 }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: "{{ __ca_certificate_material_status.results | default([]) | subelements('pkcs12_formats') }}"
  loop_control:
    loop_var: ca_certificate_export
    label: "{{ ca_certificate_export.0.ca_certificate_job.ca_certificate.name }}.{{ ca_certificate_export.1 }}"
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_pfx_jobs
  no_log: true

- name: "CA | Start FritzBox bundle jobs"
  ca_pem_bundle:
    base_dir: "{{ ca_base_dir }}"
    certificate: "{{ ca_certificate_result.ca_certificate_job.ca_certificate }}"
    name: "{{ ca_certificate_result.ca_certificate_job.ca_certificate.name }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: "{{ __ca_certificate_material_status.results | default([]) }}"
  loop_control:
    loop_var: ca_certificate_result
    label: "{{ ca_certificate_result.ca_certificate_job.ca_certificate.name }}"
  when: ca_certificate_result.fritzbox_bundle | default(false) | bool
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_fritzbox_jobs
  no_log: >-
    {{
      ca_no_log | bool
      or ca_certificate_result.ca_certificate_job.ca_certificate.key_passphrase is defined
      or ca_certificate_result.ca_certificate_job.ca_certificate.pfx_passphrase is defined
    }}

- name: "CA | Wait for PKCS#12 bundle jobs"
  ansible.builtin.async_status:
    jid: "{{ ca_certificate_job.ansible_job_id }}"
  loop: >-
    {{
      __ca_certificate_pfx_jobs.results
      | default([])
      | selectattr('ansible_job_id', 'defined')
      | list
    }}
  loop_control:
    loop_var: ca_certificate_job
    label: "{{ ca_certificate_job.ca_certificate_export.0.ca_certificate_job.ca_certificate.name }}.{{ ca_certificate_job.ca_certificate_export.1 }}"
  register: __ca_certificate_pfx_status
  until: __ca_certificate_pfx_status.finished
  retries: "{{ ca_certificate_async_retries }}"
  delay: "{{ ca_certificate_async_delay }}"
  changed_when: __ca_certificate_pfx_status.changed | default(false)
  failed_when: __ca_certificate_pfx_status.failed | default(false)
  no_log: true

- name: "CA | Wait for FritzBox bundle jobs"
  ansible.builtin.async_status:
    jid: "{{ ca_certificate_job.ansible_job_id }}"
  loop: >-
    {{
      __ca_certificate_fritzbox_jobs.results
      | default([])
      | selectattr('ansible_job_id', 'defined')
      | list
    }}
  loop_control:
    loop_var: ca_certificate_job
    label: "{{ ca_certificate_job.ca_certificate_result.ca_certificate_job.ca_certificate.name }}"
  register: __ca_certificate_fritzbox_status
  until: __ca_certificate_fritzbox_status.finished
  retries: "{{ ca_certificate_async_retries }}"
  delay: "{{ ca_certificate_async_delay }}"
  changed_when: __ca_certificate_fritzbox_status.changed | default(false)
  failed_when: __ca_certificate_fritzbox_status.failed | default(false)
  no_log: true
