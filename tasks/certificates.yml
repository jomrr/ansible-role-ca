---
# role: ansible-role-ca
# file: tasks/certificates.yml

- name: "CA | Resolve end-entity certificate models"
  ansible.builtin.set_fact:
    __ca_certificate_models: >-
      {{
        ca_certificates
        | ca_certificate_models(
          ca_certificate_types,
          ca_authorities,
          ca_base_dir,
          ca_default_certificate_days,
          ca_kerberos_realm,
          ca_subject
        )
      }}
  no_log: >-
    {{
      ca_no_log | bool
      or (ca_certificates | selectattr('key_passphrase', 'defined') | list | length > 0)
      or (ca_certificates | selectattr('pfx_passphrase', 'defined') | list | length > 0)
    }}

- name: "CA | Start standard end-entity certificate material jobs"
  x509_cert:
    base_dir: "{{ ca_base_dir }}"
    name: "{{ ca_certificate.name }}"
    issuer: "{{ ca_certificate.issuer }}"
    profile: "{{ ca_certificate.type }}"
    output_dir: "{{ ca_certificate.output_dir | default(omit) }}"
    issuer_key_passphrase: "{{ (ca_authorities | ca_authority_map)[ca_certificate.issuer].key_passphrase }}"
    key_type: "{{ ca_certificate.key_type | default(omit) }}"
    key_size: "{{ ca_certificate.key_size | default(omit) }}"
    key_passphrase: "{{ (ca_certificate.key_passphrase | string | length > 0) | ternary(ca_certificate.key_passphrase, omit) }}"
    subject_ordered: "{{ ca_certificate.subject_ordered | default(omit) }}"
    common_name: "{{ ca_certificate.common_name }}"
    email: "{{ ca_certificate.email | default(omit) }}"
    subject: "{{ ca_certificate.subject }}"
    key_usage: "{{ ca_certificate.key_usage | default(omit) }}"
    extended_key_usage: "{{ ca_certificate.extended_key_usage | default(omit) }}"
    san: "{{ ca_certificate.san | default(omit) }}"
    aia_base_url: "{{ (ca_aia.enabled | bool) | ternary(ca_aia.url, '') }}"
    cdp_base_url: "{{ (ca_cdp.enabled | bool) | ternary(ca_cdp.url, '') }}"
    raw_extensions: "{{ ca_certificate.raw_extensions | default(omit) }}"
    days: "{{ ca_certificate.days }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: >-
    {{
      __ca_certificate_models
      | rejectattr('type', 'equalto', 'identity')
      | rejectattr('type', 'equalto', 'identity_full')
      | rejectattr('type', 'equalto', 'mskdc')
      | rejectattr('type', 'equalto', 'fritzbox')
      | list
    }}
  loop_control:
    loop_var: ca_certificate
    label: "{{ ca_certificate.name }}"
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_standard_jobs
  no_log: true

- name: "CA | Start identity certificate material jobs"
  x509_identity:
    base_dir: "{{ ca_base_dir }}"
    name: "{{ ca_certificate.name }}"
    issuer: "{{ ca_certificate.issuer }}"
    profile: "{{ ca_certificate.type }}"
    output_dir: "{{ ca_certificate.output_dir | default(omit) }}"
    issuer_key_passphrase: "{{ (ca_authorities | ca_authority_map)[ca_certificate.issuer].key_passphrase }}"
    key_type: "{{ ca_certificate.key_type | default(omit) }}"
    key_size: "{{ ca_certificate.key_size | default(omit) }}"
    key_passphrase: "{{ (ca_certificate.key_passphrase | string | length > 0) | ternary(ca_certificate.key_passphrase, omit) }}"
    subject_ordered: "{{ ca_certificate.subject_ordered | default(omit) }}"
    common_name: "{{ ca_certificate.common_name }}"
    email: "{{ ca_certificate.email | default(omit) }}"
    subject: "{{ ca_certificate.subject }}"
    key_usage: "{{ ca_certificate.key_usage | default(omit) }}"
    extended_key_usage: "{{ ca_certificate.extended_key_usage | default(omit) }}"
    san: "{{ ca_certificate.san | default(omit) }}"
    aia_base_url: "{{ (ca_aia.enabled | bool) | ternary(ca_aia.url, '') }}"
    cdp_base_url: "{{ (ca_cdp.enabled | bool) | ternary(ca_cdp.url, '') }}"
    raw_extensions: "{{ ca_certificate.raw_extensions | default(omit) }}"
    days: "{{ ca_certificate.days }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: >-
    {{
      (__ca_certificate_models | selectattr('type', 'equalto', 'identity') | list)
      + (__ca_certificate_models | selectattr('type', 'equalto', 'identity_full') | list)
    }}
  loop_control:
    loop_var: ca_certificate
    label: "{{ ca_certificate.name }}"
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_identity_jobs
  no_log: true

- name: "CA | Start MSKDC certificate material jobs"
  x509_mskdc:
    base_dir: "{{ ca_base_dir }}"
    name: "{{ ca_certificate.name }}"
    issuer: "{{ ca_certificate.issuer }}"
    output_dir: "{{ ca_certificate.output_dir | default(omit) }}"
    issuer_key_passphrase: "{{ (ca_authorities | ca_authority_map)[ca_certificate.issuer].key_passphrase }}"
    key_type: "{{ ca_certificate.key_type | default(omit) }}"
    key_size: "{{ ca_certificate.key_size | default(omit) }}"
    key_passphrase: "{{ (ca_certificate.key_passphrase | string | length > 0) | ternary(ca_certificate.key_passphrase, omit) }}"
    subject_ordered: "{{ ca_certificate.subject_ordered | default(omit) }}"
    common_name: "{{ ca_certificate.common_name }}"
    email: "{{ ca_certificate.email | default(omit) }}"
    subject: "{{ ca_certificate.subject }}"
    key_usage: "{{ ca_certificate.key_usage | default(omit) }}"
    extended_key_usage: "{{ ca_certificate.extended_key_usage | default(omit) }}"
    san: "{{ ca_certificate.san | default(omit) }}"
    aia_base_url: "{{ (ca_aia.enabled | bool) | ternary(ca_aia.url, '') }}"
    cdp_base_url: "{{ (ca_cdp.enabled | bool) | ternary(ca_cdp.url, '') }}"
    raw_extensions: "{{ ca_certificate.raw_extensions | default(omit) }}"
    krb5_realm: "{{ ca_certificate.krb5_realm }}"
    ad_object_guid: "{{ ca_certificate.ad_object_guid }}"
    days: "{{ ca_certificate.days }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: "{{ __ca_certificate_models | selectattr('type', 'equalto', 'mskdc') | list }}"
  loop_control:
    loop_var: ca_certificate
    label: "{{ ca_certificate.name }}"
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_mskdc_jobs
  no_log: true

- name: "CA | Start FritzBox certificate material jobs"
  x509_fritzbox:
    base_dir: "{{ ca_base_dir }}"
    name: "{{ ca_certificate.name }}"
    issuer: "{{ ca_certificate.issuer }}"
    output_dir: "{{ ca_certificate.output_dir | default(omit) }}"
    issuer_key_passphrase: "{{ (ca_authorities | ca_authority_map)[ca_certificate.issuer].key_passphrase }}"
    key_type: "{{ ca_certificate.key_type | default(omit) }}"
    key_size: "{{ ca_certificate.key_size | default(omit) }}"
    key_passphrase: "{{ (ca_certificate.key_passphrase | string | length > 0) | ternary(ca_certificate.key_passphrase, omit) }}"
    subject_ordered: "{{ ca_certificate.subject_ordered | default(omit) }}"
    common_name: "{{ ca_certificate.common_name }}"
    email: "{{ ca_certificate.email | default(omit) }}"
    subject: "{{ ca_certificate.subject }}"
    key_usage: "{{ ca_certificate.key_usage | default(omit) }}"
    extended_key_usage: "{{ ca_certificate.extended_key_usage | default(omit) }}"
    san: "{{ ca_certificate.san | default(omit) }}"
    aia_base_url: "{{ (ca_aia.enabled | bool) | ternary(ca_aia.url, '') }}"
    cdp_base_url: "{{ (ca_cdp.enabled | bool) | ternary(ca_cdp.url, '') }}"
    raw_extensions: "{{ ca_certificate.raw_extensions | default(omit) }}"
    days: "{{ ca_certificate.days }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: "{{ __ca_certificate_models | selectattr('type', 'equalto', 'fritzbox') | list }}"
  loop_control:
    loop_var: ca_certificate
    label: "{{ ca_certificate.name }}"
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_fritzbox_cert_jobs
  no_log: true

- name: "CA | Wait for end-entity certificate material jobs"
  ansible.builtin.async_status:
    jid: "{{ ca_certificate_job.ansible_job_id }}"
  loop: >-
    {{
      (
        (__ca_certificate_standard_jobs.results | default([]))
        + (__ca_certificate_identity_jobs.results | default([]))
        + (__ca_certificate_mskdc_jobs.results | default([]))
        + (__ca_certificate_fritzbox_cert_jobs.results | default([]))
      )
      | selectattr('ansible_job_id', 'defined')
      | list
    }}
  loop_control:
    loop_var: ca_certificate_job
    label: "{{ ca_certificate_job.ca_certificate.name }}"
  register: __ca_certificate_material_status
  until: __ca_certificate_material_status.finished
  retries: "{{ ca_certificate_async_retries }}"
  delay: "{{ ca_certificate_async_delay }}"
  changed_when: __ca_certificate_material_status.changed | default(false)
  failed_when: __ca_certificate_material_status.failed | default(false)
  no_log: true

- name: "CA | Start PKCS#12 bundle jobs"
  ca_pkcs12:
    base_dir: "{{ ca_base_dir }}"
    name: "{{ ca_certificate_export.0.name }}"
    output_dir: "{{ ca_certificate_export.0.output_dir | default(omit) }}"
    format: "{{ ca_certificate_export.1 }}"
    friendly_name: "{{ ca_certificate_export.0.friendly_name | default(ca_certificate_export.0.common_name) }}"
    key_passphrase: >-
      {{
        (ca_certificate_export.0.key_passphrase | string | length > 0)
        | ternary(ca_certificate_export.0.key_passphrase, omit)
      }}
    passphrase: "{{ ca_certificate_export.0.pfx_passphrase }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: "{{ __ca_certificate_models | subelements('formats') }}"
  loop_control:
    loop_var: ca_certificate_export
    label: "{{ ca_certificate_export.0.name }}.{{ ca_certificate_export.1 }}"
  when: ca_certificate_export.1 in ['pfx', 'p12']
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_pfx_jobs
  no_log: true

- name: "CA | Start FritzBox bundle jobs"
  ca_pem_bundle:
    base_dir: "{{ ca_base_dir }}"
    name: "{{ ca_certificate.name }}"
    output_dir: "{{ ca_certificate.output_dir | default(omit) }}"
    order: "{{ ca_fritzbox_bundle_order }}"
    owner: "{{ ca_owner }}"
    group: "{{ ca_group }}"
    force: "{{ ca_force_reissue | bool }}"
  loop: "{{ __ca_certificate_models }}"
  loop_control:
    loop_var: ca_certificate
    label: "{{ ca_certificate.name }}"
  when: "'fritzbox' in ca_certificate.formats"
  async: "{{ ca_certificate_async_timeout }}"
  poll: 0
  changed_when: false
  register: __ca_certificate_fritzbox_jobs
  no_log: >-
    {{
      ca_no_log | bool
      or ca_certificate.key_passphrase is defined
      or ca_certificate.pfx_passphrase is defined
    }}

- name: "CA | Wait for PKCS#12 bundle jobs"
  ansible.builtin.async_status:
    jid: "{{ ca_certificate_job.ansible_job_id }}"
  loop: >-
    {{
      __ca_certificate_pfx_jobs.results
      | default([])
      | selectattr('ansible_job_id', 'defined')
      | list
    }}
  loop_control:
    loop_var: ca_certificate_job
    label: "{{ ca_certificate_job.ca_certificate_export.0.name }}.{{ ca_certificate_job.ca_certificate_export.1 }}"
  register: __ca_certificate_pfx_status
  until: __ca_certificate_pfx_status.finished
  retries: "{{ ca_certificate_async_retries }}"
  delay: "{{ ca_certificate_async_delay }}"
  changed_when: __ca_certificate_pfx_status.changed | default(false)
  failed_when: __ca_certificate_pfx_status.failed | default(false)
  no_log: true

- name: "CA | Wait for FritzBox bundle jobs"
  ansible.builtin.async_status:
    jid: "{{ ca_certificate_job.ansible_job_id }}"
  loop: >-
    {{
      __ca_certificate_fritzbox_jobs.results
      | default([])
      | selectattr('ansible_job_id', 'defined')
      | list
    }}
  loop_control:
    loop_var: ca_certificate_job
    label: "{{ ca_certificate_job.ca_certificate.name }}"
  register: __ca_certificate_fritzbox_status
  until: __ca_certificate_fritzbox_status.finished
  retries: "{{ ca_certificate_async_retries }}"
  delay: "{{ ca_certificate_async_delay }}"
  changed_when: __ca_certificate_fritzbox_status.changed | default(false)
  failed_when: __ca_certificate_fritzbox_status.failed | default(false)
  no_log: true
