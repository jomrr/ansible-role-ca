---
# role: ca
# file: tasks/assert.yml

- name: "CA | Assert supported platform family"
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family in ['Debian', 'RedHat', 'Suse']
    fail_msg: "The ca role supports Debian, RedHat, and Suse platform families."

- name: "CA | Assert authority graph is valid"
  ansible.builtin.assert:
    that:
      - (ca_authorities | ca_authority_map | length) == (ca_authorities | length)
    fail_msg: "ca_authorities need unique names and parents that reference managed authorities."

- name: "CA | Assert authority passphrases are set"
  ansible.builtin.assert:
    that:
      - ca_authority.key_passphrase | default('') | string | length > 0
    fail_msg: "Every managed CA needs a non-empty key_passphrase."
  loop: "{{ ca_authorities }}"
  loop_control:
    loop_var: ca_authority
    label: "{{ ca_authority.name | default('unnamed') }}"
  no_log: true

- name: "CA | Assert revocation definitions target known authorities"
  ansible.builtin.assert:
    that:
      - ca_revocations is mapping
      - >-
        ca_revocations.keys()
        | list
        | difference(ca_authorities | map(attribute='name') | list)
        | length
        == 0
    fail_msg: "ca_revocations keys must match managed authority names."

- name: "CA | Assert managed certificates are consistent"
  ansible.builtin.assert:
    that:
      - >-
        ca_certificates
        | map(attribute='name')
        | list
        | length
        ==
        ca_certificates
        | map(attribute='name')
        | unique
        | list
        | length
      - >-
        ca_certificates
        | map(attribute='type')
        | list
        | difference(ca_certificate_types.keys() | list)
        | length
        == 0
    fail_msg: "ca_certificates need unique names and types defined in ca_certificate_types."
  when: ca_certificates | length > 0
  no_log: "{{ ca_no_log | bool }}"
