---
# role: ansible-role-ca
# file: defaults/main.yml

# General CA settings.
ca_name: Yourdomain
ca_base_dir: "{{ ca_fhs_dir | default('/etc/ssl') }}/{{ ca_name | lower }}"
ca_base_url: "http://pki.yourdomain.tld"
ca_kerberos_realm: ""
ca_owner: root
ca_group: root
ca_no_log: true

ca_subject:
  country: DE
  state: Bayern
  locality: Erlangen
  organization: Yourdomain SE
  organizational_unit: Yourdomain Certificate Authority

ca_default_bits: 4096
ca_force_reissue: false
ca_certificate_async_timeout: 600
ca_certificate_async_retries: 600
ca_certificate_async_delay: 1

ca_renewal:
  warn_before_days: 30
  renew_before_days: 0
  renew_at: ""
  rekey: false

# Managed CA topology. Store real key_passphrase values in Ansible Vault.
# CRL renewal services read passphrases from root profile environment variables.
ca_authorities:
  - name: root
    common_name: "{{ ca_name }} Root CA"
    parent: root
    days: 3652
    default_days: 397
    crl_days: 30
    key_passphrase: ""
  - name: component
    common_name: "{{ ca_name }} Component CA"
    parent: root
    days: 1826
    default_days: 397
    crl_days: 30
    key_passphrase: ""
  - name: network
    common_name: "{{ ca_name }} Network CA"
    parent: root
    days: 1826
    default_days: 397
    crl_days: 30
    key_passphrase: ""
  - name: identity
    common_name: "{{ ca_name }} Identity CA"
    parent: root
    days: 1826
    default_days: 730
    crl_days: 30
    key_passphrase: ""

# Revocations are keyed by issuing authority name.
ca_revocations:
  root: []
  component: []
  network: []
  identity: []

# List of managed certificates.
ca_certificates: []

ca_crl_automation_enabled: false
ca_crl_automation_ansible_playbook: ansible-playbook
ca_crl_automation_on_calendar: daily
ca_crl_automation_randomized_delay_sec: 15m
ca_crl_automation_persistent: true

# Optional AIA/CDP publishing targets. Each target receives CA certificates and
# issuing chains below path/aia, and CRLs below path/crl.
ca_publish_targets: []
ca_publish_directory_mode: "0755"
ca_publish_mode: "0644"

ca_create_dhparams: false
