---
# role: ansible-role-ca
# file: defaults/main.yml

# General CA settings.
ca_name: Yourdomain
ca_base_dir: "{{ ca_fhs_dir | default('/etc/ssl') }}/{{ ca_name | lower }}"
ca_base_url: "https://pki.yourdomain.tld"
ca_kerberos_realm: ""
ca_owner: root
ca_group: root
ca_no_log: true

ca_subject:
  country: DE
  state: Bayern
  locality: Erlangen
  organization: Yourdomain SE
  organizational_unit: Yourdomain Certificate Authority

ca_default_bits: 4096
ca_default_md: sha512
ca_force_reissue: false
ca_certificate_async_timeout: 600
ca_certificate_async_retries: 600
ca_certificate_async_delay: 1

# Managed CA topology. Store real key_passphrase values in Ansible Vault.
ca_authorities:
  - name: root
    common_name: "{{ ca_name }} Root CA"
    parent: root
    days: 3652
    crl_days: 30
    key_passphrase: ""
    revocations: []
  - name: component
    common_name: "{{ ca_name }} Component CA"
    parent: root
    days: 1826
    crl_days: 30
    key_passphrase: ""
    revocations: []
  - name: network
    common_name: "{{ ca_name }} Network CA"
    parent: root
    days: 1826
    crl_days: 30
    key_passphrase: ""
    revocations: []
  - name: identity
    common_name: "{{ ca_name }} Identity CA"
    parent: root
    days: 1826
    crl_days: 30
    key_passphrase: ""
    revocations: []

# Publication endpoints. The URL values are embedded into issued certificates.
ca_aia:
  enabled: true
  url: "{{ ca_base_url }}/aia"

ca_cdp:
  enabled: true
  url: "{{ ca_base_url }}/crl"

ca_default_certificate_days: 397
ca_certificate_type_days:
  tls_server: "{{ ca_default_certificate_days }}"
  tls_client: "{{ ca_default_certificate_days }}"
  mskdc: "{{ ca_default_certificate_days }}"
  fritzbox: "{{ ca_default_certificate_days }}"
  identity_full: 730
  identity: 730
  eap_tls_client: "{{ ca_default_certificate_days }}"

# List of managed end-entity certificates.
ca_certificates: []

ca_crl:
  enabled: true
  formats:
    - pem
    - der
  mode: generate

ca_crl_automation:
  enabled: false
  ansible_playbook: ansible-playbook
  on_calendar: daily
  randomized_delay_sec: 15m
  persistent: true

ca_create_dhparams: false
