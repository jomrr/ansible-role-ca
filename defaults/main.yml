---
# role: ansible-role-ca
# file: defaults/main.yml

# General CA settings.
ca_name: Yourdomain
ca_base_dir: "{{ ca_fhs_dir | default('/etc/ssl') }}/{{ ca_name | lower }}"
ca_base_url: "https://pki.yourdomain.tld"
ca_kerberos_realm: ""
ca_owner: root
ca_group: root
ca_no_log: true

ca_country: DE
ca_state: Bayern
ca_locality: Erlangen
ca_organization: Yourdomain SE
ca_organizational_unit: Yourdomain Certificate Authority

ca_key_type: RSA
ca_default_bits: 4096
ca_default_md: sha512
ca_force_reissue: false
ca_certificate_async_timeout: 600
ca_certificate_async_retries: 600
ca_certificate_async_delay: 1

# CA private key passphrases are mandatory. Store real values in vaulted
# inventory variables.
ca_privatekey_passphrases: {}

# Publication endpoints. The URL values are embedded into issued certificates.
ca_aia:
  enabled: true
  url: "{{ ca_base_url }}/aia"

ca_cdp:
  enabled: true
  url: "{{ ca_base_url }}/crl"

# Validity periods are intentionally the only overridable part of the built-in
# CA topology and certificate profiles.
ca_authority_days:
  root: 3652
  component: 1826
  network: 1826
  identity: 1826

ca_default_certificate_days: 397
ca_certificate_type_days:
  tls_server: "{{ ca_default_certificate_days }}"
  tls_client: "{{ ca_default_certificate_days }}"
  mskdc: "{{ ca_default_certificate_days }}"
  fritzbox: "{{ ca_default_certificate_days }}"
  identity_full: 730
  identity: 730
  eap_tls_client: "{{ ca_default_certificate_days }}"

# List of managed end-entity certificates.
ca_certificates: []

# Revocations are grouped by issuing CA and passed to the role-local ca_crl module.
ca_revocations:
  root: []
  component: []
  network: []
  identity: []

ca_crl:
  enabled: true
  formats:
    - pem
    - der
  mode: generate

ca_crl_automation:
  enabled: false
  ansible_playbook: ansible-playbook
  on_calendar: daily
  randomized_delay_sec: 15m
  persistent: true

ca_create_dhparams: false
