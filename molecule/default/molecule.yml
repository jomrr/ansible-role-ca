---
# role: ca
# file: molecule/default/molecule.yml

dependency:
  name: "galaxy"
driver:
  name: "podman"
provisioner:
  name: "ansible"
  config_options:
    defaults:
      forks: 12
      interpreter_python: "auto_silent"
      allow_world_readable_tmpfiles: true
      callbacks_enabled: "ansible.posix.profile_tasks,ansible.posix.timer"
      callback_result_format: "yaml"
      remote_tmp: "/tmp/.ansible/tmp"
    ssh_connection:
      pipelining: true
  log: true
  playbooks:
    converge: "../resources/playbooks/converge.yml"
    verify: "../resources/playbooks/verify.yml"
  inventory:
    group_vars:
      all:
        ca_no_log: false
        ca_name: "Example"
        ca_base_url: "http://pki.molecule.test"
        ca_crl_automation_enabled: true
        ca_publish_targets:
          - name: "ca"
            path: "/var/www/pki"
        ca_renewal:
          warn_before_days: 400
          renew_before_days: 0
          renew_at: ""
          rekey: false
        ca_authorities:
          - name: "root"
            common_name: "Example Root CA"
            parent: "root"
            days: 3652
            default_days: 397
            crl_days: 30
            key_passphrase: "molecule-root-passphrase"
          - name: "component"
            common_name: "Example Component CA"
            parent: "root"
            days: 1826
            default_days: 397
            crl_days: 30
            key_passphrase: "molecule-component-passphrase"
          - name: "network"
            common_name: "Example Network CA"
            parent: "root"
            days: 1826
            default_days: 397
            crl_days: 30
            key_passphrase: "molecule-network-passphrase"
          - name: "identity"
            common_name: "Example Identity CA"
            parent: "root"
            days: 1826
            default_days: 730
            crl_days: 30
            key_passphrase: "molecule-identity-passphrase"
        ca_revocations:
          component:
            - name: "web01"
              reason: "key_compromise"
              invalidity_date: "2026-06-14T00:00:00Z"
        ca_certificates:
          - name: "web01"
            type: "tls_server"
            common_name: "web01.molecule.test"
            formats:
              - "pem"
              - "der"
              - "txt"
              - "fullchain"
            san:
              - "DNS:web01.molecule.test"
              - "DNS:web01"
          - name: "client01"
            type: "tls_client"
            common_name: "client01.molecule.test"
          - name: "ec-p256-client"
            type: "tls_client"
            common_name: "ec-p256-client.molecule.test"
            key_type: "ECDSA"
            key_size: 256
          - name: "ec-p384-client"
            type: "tls_client"
            common_name: "ec-p384-client.molecule.test"
            key_type: "ECDSA"
            key_size: 384
          - name: "ed25519-client"
            type: "tls_client"
            common_name: "ed25519-client.molecule.test"
            key_type: "Ed25519"
          - name: "ed448-client"
            type: "tls_client"
            common_name: "ed448-client.molecule.test"
            key_type: "Ed448"
          - name: "dc01"
            type: "mskdc"
            common_name: "dc01.molecule.test"
            krb5_realm: "MOLECULE.TEST"
            ad_object_guid: "d900ea2b-1253-4754-a22b-cf28508dfed3"
            san:
              - "DNS:dc01.molecule.test"
              - "DNS:dc01"
          - name: "fritzbox01"
            type: "fritzbox"
            common_name: "fritzbox.molecule.test"
            san:
              - "DNS:fritzbox.molecule.test"
              - "IP:192.0.2.1"
          - name: "user-full"
            type: "identity_full"
            common_name: "Molecule User Full"
            email: "user-full@molecule.test"
            san:
              - "email:user-full@molecule.test"
              - "otherName:1.3.6.1.4.1.311.20.2.3;UTF8:user-full@molecule.test"
            pfx_passphrase: "molecule-pfx-passphrase"
          - name: "user-smime"
            type: "identity"
            common_name: "Molecule User S/MIME"
            email: "user-smime@molecule.test"
            san:
              - "email:user-smime@molecule.test"
              - "otherName:1.3.6.1.4.1.311.20.2.3;UTF8:user-smime@molecule.test"
            pfx_passphrase: "molecule-smime-pfx-passphrase"
          - name: "wifi-user"
            type: "eap_tls_client"
            common_name: "wifi-user@molecule.test"
            san:
              - "email:wifi-user@molecule.test"
verifier:
  name: "ansible"
scenario:
  name: "default"
platforms:
  - name: "ca"
    image: "docker.io/${uns:-jomrr}/molecule-${img:-fedora}:${tag:-latest}"
    pre_build_image: true
    override_command: false
    systemd: true
