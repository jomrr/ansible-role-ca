---
# role: ca
# file: molecule/resources/playbooks/verify.yml

- name: "Molecule | verify | ca"
  hosts: all
  gather_facts: true
  vars:
    ca_molecule_base: "{{ (ansible_facts.os_family == 'RedHat') | ternary('/etc/pki', '/etc/ssl') }}/{{ ca_name | lower }}"
  tasks:
    - name: "CA | Check managed CA, CRL, and certificate files"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: __ca_molecule_files
      loop:
        - "{{ ca_molecule_base }}/ca/root-ca.pem"
        - "{{ ca_molecule_base }}/ca/root-ca.der"
        - "{{ ca_molecule_base }}/ca/root-ca.txt"
        - "{{ ca_molecule_base }}/ca/component-ca.pem"
        - "{{ ca_molecule_base }}/ca/component-ca.txt"
        - "{{ ca_molecule_base }}/ca/network-ca.pem"
        - "{{ ca_molecule_base }}/ca/network-ca.txt"
        - "{{ ca_molecule_base }}/ca/identity-ca.pem"
        - "{{ ca_molecule_base }}/ca/identity-ca.txt"
        - "{{ ca_molecule_base }}/crl/component-ca.crl"
        - "{{ ca_molecule_base }}/crl/component-ca.crl.pem"
        - "{{ ca_molecule_base }}/inventory/ca-inventory.json"
        - "{{ ca_molecule_base }}/automation/crl-renew.yml"
        - "{{ ca_molecule_base }}/automation/library/ca_crl.py"
        - "{{ ca_molecule_base }}/automation/module_utils/ca_file.py"
        - "{{ ca_molecule_base }}/automation/module_utils/ca_inventory.py"
        - "{{ ca_molecule_base }}/automation/module_utils/ca_profiles.py"
        - "{{ ca_molecule_base }}/automation/module_utils/ca_text.py"
        - "{{ ca_molecule_base }}/automation/module_utils/ca_x509.py"
        - "/etc/systemd/system/{{ ca_name | lower }}-crl-renew@.service"
        - "/etc/systemd/system/{{ ca_name | lower }}-crl-renew@.timer"
        - "{{ ca_molecule_base }}/certs/web01/web01.pem"
        - "{{ ca_molecule_base }}/certs/web01/web01.der"
        - "{{ ca_molecule_base }}/certs/web01/web01.txt"
        - "{{ ca_molecule_base }}/certs/web01/web01-fullchain.pem"
        - "{{ ca_molecule_base }}/certs/client01/client01.pem"
        - "{{ ca_molecule_base }}/certs/ec-p256-client/ec-p256-client.pem"
        - "{{ ca_molecule_base }}/certs/ec-p384-client/ec-p384-client.pem"
        - "{{ ca_molecule_base }}/certs/ed25519-client/ed25519-client.pem"
        - "{{ ca_molecule_base }}/certs/ed448-client/ed448-client.pem"
        - "{{ ca_molecule_base }}/certs/dc01/dc01.pem"
        - "{{ ca_molecule_base }}/certs/dc01/dc01.txt"
        - "{{ ca_molecule_base }}/certs/fritzbox01/fritzbox01-fritzbox.pem"
        - "{{ ca_molecule_base }}/certs/fritzbox01/fritzbox01.txt"
        - "{{ ca_molecule_base }}/certs/user-full/user-full.pfx"
        - "{{ ca_molecule_base }}/certs/user-full/user-full.txt"
        - "{{ ca_molecule_base }}/certs/user-smime/user-smime.pem"
        - "{{ ca_molecule_base }}/certs/user-smime/user-smime.pfx"
        - "{{ ca_molecule_base }}/certs/wifi-user/wifi-user.pem"
        - "{{ ca_molecule_base }}/certs/wifi-user/wifi-user.txt"

    - name: "CA | Assert managed files exist"
      ansible.builtin.assert:
        that:
          - __ca_molecule_files.results | map(attribute='stat.exists') | min

    - name: "CA | Read CA inventory"
      ansible.builtin.slurp:
        src: "{{ ca_molecule_base }}/inventory/ca-inventory.json"
      register: __ca_molecule_inventory_raw

    - name: "CA | Assert CA inventory"
      vars:
        __ca_molecule_inventory: "{{ __ca_molecule_inventory_raw.content | b64decode | from_json }}"
      ansible.builtin.assert:
        that:
          - __ca_molecule_inventory.schema_version == 1
          - __ca_molecule_inventory.ca_name == ca_name
          - __ca_molecule_inventory.authorities | length == 4
          - __ca_molecule_inventory.certificates | length == 11
          - __ca_molecule_inventory.issued_certificates | length == 11
          - __ca_molecule_inventory.crls | length == 8
          - >-
            (
              __ca_molecule_inventory.certificates
              | selectattr('name', 'equalto', 'web01')
              | first
            ).issuer == 'component'
          - >-
            (
              __ca_molecule_inventory.certificates
              | selectattr('name', 'equalto', 'web01')
              | first
            ).status.state == 'valid'
          - >-
            (
              __ca_molecule_inventory.certificates
              | selectattr('name', 'equalto', 'web01')
              | first
            ).current
          - >-
            (
              __ca_molecule_inventory.certificates
              | selectattr('name', 'equalto', 'web01')
              | first
            ).certificate.fingerprints.sha256 | length > 0

    - name: "CA | Read default signature certificate text"
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ item }} -noout -text"
      register: __ca_molecule_sha384_certificate_text
      loop:
        - "{{ ca_molecule_base }}/ca/root-ca.pem"
        - "{{ ca_molecule_base }}/ca/component-ca.pem"
        - "{{ ca_molecule_base }}/ca/network-ca.pem"
        - "{{ ca_molecule_base }}/ca/identity-ca.pem"
        - "{{ ca_molecule_base }}/certs/web01/web01.pem"
        - "{{ ca_molecule_base }}/certs/client01/client01.pem"
        - "{{ ca_molecule_base }}/certs/ec-p256-client/ec-p256-client.pem"
        - "{{ ca_molecule_base }}/certs/ec-p384-client/ec-p384-client.pem"
        - "{{ ca_molecule_base }}/certs/ed25519-client/ed25519-client.pem"
        - "{{ ca_molecule_base }}/certs/ed448-client/ed448-client.pem"
        - "{{ ca_molecule_base }}/certs/dc01/dc01.pem"
        - "{{ ca_molecule_base }}/certs/user-full/user-full.pem"
        - "{{ ca_molecule_base }}/certs/user-smime/user-smime.pem"
        - "{{ ca_molecule_base }}/certs/wifi-user/wifi-user.pem"
      changed_when: false

    - name: "CA | Assert default certificate signature digest"
      ansible.builtin.assert:
        that:
          - >-
            __ca_molecule_sha384_certificate_text.results
            | map(attribute='stdout')
            | reject('search', 'Signature Algorithm: sha384WithRSAEncryption')
            | list
            | length == 0

    - name: "CA | Read ECDSA P-256 certificate text"
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ ca_molecule_base }}/certs/ec-p256-client/ec-p256-client.pem -noout -text"
      register: __ca_molecule_ec_p256_text
      changed_when: false

    - name: "CA | Assert ECDSA P-256 certificate public key"
      ansible.builtin.assert:
        that:
          - "'Public Key Algorithm: id-ecPublicKey' in __ca_molecule_ec_p256_text.stdout"
          - >-
            'ASN1 OID: prime256v1' in __ca_molecule_ec_p256_text.stdout
            or 'NIST CURVE: P-256' in __ca_molecule_ec_p256_text.stdout

    - name: "CA | Read ECDSA P-384 certificate text"
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ ca_molecule_base }}/certs/ec-p384-client/ec-p384-client.pem -noout -text"
      register: __ca_molecule_ec_p384_text
      changed_when: false

    - name: "CA | Assert ECDSA P-384 certificate public key"
      ansible.builtin.assert:
        that:
          - "'Public Key Algorithm: id-ecPublicKey' in __ca_molecule_ec_p384_text.stdout"
          - >-
            'ASN1 OID: secp384r1' in __ca_molecule_ec_p384_text.stdout
            or 'NIST CURVE: P-384' in __ca_molecule_ec_p384_text.stdout

    - name: "CA | Read Ed25519 certificate text"
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ ca_molecule_base }}/certs/ed25519-client/ed25519-client.pem -noout -text"
      register: __ca_molecule_ed25519_text
      changed_when: false

    - name: "CA | Assert Ed25519 certificate public key"
      ansible.builtin.assert:
        that:
          - "'Public Key Algorithm: ED25519' in __ca_molecule_ed25519_text.stdout"

    - name: "CA | Read Ed448 certificate text"
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ ca_molecule_base }}/certs/ed448-client/ed448-client.pem -noout -text"
      register: __ca_molecule_ed448_text
      changed_when: false

    - name: "CA | Assert Ed448 certificate public key"
      ansible.builtin.assert:
        that:
          - "'Public Key Algorithm: ED448' in __ca_molecule_ed448_text.stdout"

    - name: "CA | Verify Component CA issued certificates"
      ansible.builtin.command:
        cmd: "openssl verify -CAfile {{ ca_molecule_base }}/chains/component-ca-chain.pem {{ item }}"
      loop:
        - "{{ ca_molecule_base }}/certs/web01/web01.pem"
        - "{{ ca_molecule_base }}/certs/client01/client01.pem"
        - "{{ ca_molecule_base }}/certs/ec-p256-client/ec-p256-client.pem"
        - "{{ ca_molecule_base }}/certs/ec-p384-client/ec-p384-client.pem"
        - "{{ ca_molecule_base }}/certs/ed25519-client/ed25519-client.pem"
        - "{{ ca_molecule_base }}/certs/ed448-client/ed448-client.pem"
        - "{{ ca_molecule_base }}/certs/dc01/dc01.pem"
        - "{{ ca_molecule_base }}/certs/fritzbox01/fritzbox01.pem"
      changed_when: false

    - name: "CA | Verify Identity CA issued certificates"
      ansible.builtin.command:
        cmd: "openssl verify -CAfile {{ ca_molecule_base }}/chains/identity-ca-chain.pem {{ item }}"
      loop:
        - "{{ ca_molecule_base }}/certs/user-full/user-full.pem"
        - "{{ ca_molecule_base }}/certs/user-smime/user-smime.pem"
      changed_when: false

    - name: "CA | Verify Network CA issued certificates"
      ansible.builtin.command:
        cmd: "openssl verify -CAfile {{ ca_molecule_base }}/chains/network-ca-chain.pem {{ ca_molecule_base }}/certs/wifi-user/wifi-user.pem"
      changed_when: false

    - name: "CA | Read MSKDC certificate text"
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ ca_molecule_base }}/certs/dc01/dc01.pem -noout -text -certopt ext_dump"
      register: __ca_molecule_mskdc_text
      changed_when: false

    - name: "CA | Assert MSKDC EKUs and extension OIDs"
      ansible.builtin.assert:
        that:
          - "'TLS Web Server Authentication' in __ca_molecule_mskdc_text.stdout"
          - "'TLS Web Client Authentication' in __ca_molecule_mskdc_text.stdout"
          - "'othername: 1.3.6.1.5.2.2' in __ca_molecule_mskdc_text.stdout"
          - >-
            'KDC Authentication' in __ca_molecule_mskdc_text.stdout
            or 'Signing KDC Response' in __ca_molecule_mskdc_text.stdout
            or 'PKINIT' in __ca_molecule_mskdc_text.stdout
            or 'id-pkinit' in __ca_molecule_mskdc_text.stdout
            or '1.3.6.1.5.2.3.5' in __ca_molecule_mskdc_text.stdout
          - "'1.3.6.1.4.1.311.20.2' in __ca_molecule_mskdc_text.stdout"
          - "'1.3.6.1.4.1.311.25.1' in __ca_molecule_mskdc_text.stdout"

    - name: "CA | Read FritzBox bundle PEM markers"
      ansible.builtin.command:
        cmd: "grep -E '^-----BEGIN (CERTIFICATE|.*PRIVATE KEY)-----' {{ ca_molecule_base }}/certs/fritzbox01/fritzbox01-fritzbox.pem"
      register: __ca_molecule_fritzbox_markers
      changed_when: false

    - name: "CA | Assert FritzBox bundle order"
      ansible.builtin.assert:
        that:
          - __ca_molecule_fritzbox_markers.stdout_lines | first == '-----BEGIN CERTIFICATE-----'
          - __ca_molecule_fritzbox_markers.stdout_lines | last is search('PRIVATE KEY')
          - >-
            (
              __ca_molecule_fritzbox_markers.stdout_lines[:-1]
              | select('equalto', '-----BEGIN CERTIFICATE-----')
              | list
              | length
            ) >= 2

    - name: "CA | Read FritzBox certificate text"
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ ca_molecule_base }}/certs/fritzbox01/fritzbox01.pem -noout -text"
      register: __ca_molecule_fritzbox_text
      changed_when: false

    - name: "CA | Assert FritzBox certificate profile"
      ansible.builtin.assert:
        that:
          - "'Signature Algorithm: sha384WithRSAEncryption' in __ca_molecule_fritzbox_text.stdout"
          - "'CA:FALSE' in __ca_molecule_fritzbox_text.stdout"
          - "'pathlen' not in (__ca_molecule_fritzbox_text.stdout | lower)"

    - name: "CA | Parse Identity PFX"
      ansible.builtin.command:
        cmd: "openssl pkcs12 -in {{ ca_molecule_base }}/certs/{{ item.name }}/{{ item.name }}.pfx -passin pass:{{ item.passphrase }} -noout -info"
      loop:
        - name: user-full
          passphrase: molecule-pfx-passphrase
        - name: user-smime
          passphrase: molecule-smime-pfx-passphrase
      changed_when: false

    - name: "CA | Parse DER CRL"
      ansible.builtin.command:
        cmd: "openssl crl -in {{ ca_molecule_base }}/crl/component-ca.crl -inform DER -noout -text"
      register: __ca_molecule_der_crl_text
      changed_when: false

    - name: "CA | Assert default CRL signature digest"
      ansible.builtin.assert:
        that:
          - "'Signature Algorithm: sha384WithRSAEncryption' in __ca_molecule_der_crl_text.stdout"
